<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post Dim - Fixed Auto Refresh</title>

  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      padding-top: 40px;
      margin: 0;
    }
    .container {
      width: 100%;
      max-width: 520px;
      padding: 20px;
    }
    h2 { text-align: center; color: #38bdf8; margin-bottom: 5px; }
    .status-bar { text-align: center; font-size: 12px; color: #94a3b8; margin-bottom: 20px; }
    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #1e293b;
      color: white;
      box-sizing: border-box;
      outline: none;
    }
    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      background: #22c55e;
      color: white;
    }
    .card {
      background: #1e293b;
      padding: 15px;
      margin-top: 12px;
      border-radius: 8px;
      border-left: 4px solid #38bdf8;
    }
    .card b { color: #38bdf8; display: block; }
    #list { margin-top: 20px; }
  </style>
</head>
<body>

  <div class="container">
    <h2>Post Dim</h2>
    <div class="status-bar">🔄 Auto-sync setiap 3 detik</div>

    <input id="name" placeholder="Nama Anda" />
    <input id="message" placeholder="Tulis pesan..." />

    <button id="btnSend">Kirim Pesan</button>

    <div id="list">
      <p style="text-align: center; color: #94a3b8;">Menghubungkan ke database...</p>
    </div>
  </div>

  <script>
    // Membungkus kode agar tidak terjadi bentrok variabel (Error: Already declared)
    (function() {
      const SUPABASE_URL = "https://dppocgudnizboyjhkqpp.supabase.co";
      const SUPABASE_ANON_KEY = "sb_publishable_sohjVB2_F6I12ivkKHh07g_06hOuThS"; // <--- GANTI INI

      // Gunakan variabel lokal di dalam scope ini
      const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      
      const listContainer = document.getElementById("list");
      const nameInput = document.getElementById("name");
      const messageInput = document.getElementById("message");
      const btnSend = document.getElementById("btnSend");

      async function loadMessages() {
        const { data, error } = await _supabase
          .from("messages")
          .select("*")
          .order("created_at", { ascending: false });

        if (error) {
          console.error("Fetch Error:", error.message);
          return;
        }
        render(data || []);
      }

      function render(messages) {
        if (messages.length === 0) {
          listContainer.innerHTML = '<p style="text-align: center; color: #94a3b8;">Belum ada pesan.</p>';
          return;
        }
        listContainer.innerHTML = "";
        messages.forEach(m => {
          const div = document.createElement("div");
          div.className = "card";
          div.innerHTML = `<b>${m.name}</b> ${m.message}`;
          listContainer.appendChild(div);
        });
      }

      // Handler kirim pesan (cara yang lebih aman daripada onclick di HTML)
      btnSend.addEventListener("click", async () => {
        const name = nameInput.value.trim();
        const message = messageInput.value.trim();

        if (!name || !message) return;

        const { error } = await _supabase
          .from("messages")
          .insert([{ name, message }]);

        if (error) {
          alert("Gagal kirim: " + error.message);
        } else {
          messageInput.value = "";
          loadMessages();
        }
      });

      // Jalankan interval 3 detik
      loadMessages();
      setInterval(loadMessages, 3000);

    })();
  </script>

</body>
</html>
