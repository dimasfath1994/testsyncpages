<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Post Dim - JSON Sync (No DB)</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      padding-top: 40px;
    }

    .container {
      width: 450px;
    }

    h2 {
      margin-bottom: 15px;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 15px;
    }

    input {
      padding: 10px;
      border-radius: 6px;
      border: none;
    }

    button {
      padding: 10px;
      background: #22c55e;
      border: none;
      color: white;
      cursor: pointer;
      border-radius: 6px;
    }

    button:hover {
      background: #16a34a;
    }

    .card {
      background: #1e293b;
      padding: 10px;
      margin-top: 10px;
      border-radius: 6px;
    }

    .meta {
      font-size: 12px;
      color: #94a3b8;
      margin-bottom: 5px;
    }

    .sync-info {
      font-size: 12px;
      color: #38bdf8;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>
  <div class="container">

    <h2>Post Dim - JSON Sync (No DB)</h2>

    <div class="sync-info">
      Mode: File-based sync (polling JSON every 3s)
    </div>

    <form id="form">
      <input type="text" id="name" placeholder="Name" required />
      <input type="text" id="message" placeholder="Message" required />
      <button type="submit">Add Local</button>
    </form>

    <button id="forceSync">Force Sync</button>

    <div id="list"></div>
  </div>

  <script>
    // =========================
    // SIMULATED REMOTE JSON URL
    // =========================
    // nanti ini bisa kamu ganti:
    // - GitHub raw file
    // - GitHub Pages JSON file
    const REMOTE_URL = "./data.json";

    const STORAGE_KEY = "postdim_local";

    let localData = loadLocal();

    const list = document.getElementById("list");
    const form = document.getElementById("form");

    // =========================
    // LOCAL STORAGE
    // =========================
    function loadLocal() {
      const data = localStorage.getItem(STORAGE_KEY);
      return data ? JSON.parse(data) : [];
    }

    function saveLocal() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(localData));
    }

    // =========================
    // RENDER
    // =========================
    function render(data) {
      list.innerHTML = "";

      data
        .slice()
        .reverse()
        .forEach(item => {
          const div = document.createElement("div");
          div.className = "card";

          div.innerHTML = `
            <div class="meta">
              ${item.source} • ${new Date(item.timestamp).toLocaleTimeString()}
            </div>
            <b>${item.name}</b><br/>
            ${item.message}
          `;

          list.appendChild(div);
        });
    }

    // =========================
    // ADD LOCAL MESSAGE
    // =========================
    form.addEventListener("submit", (e) => {
      e.preventDefault();

      const name = document.getElementById("name").value;
      const message = document.getElementById("message").value;

      const newItem = {
        id: crypto.randomUUID(),
        name,
        message,
        timestamp: Date.now(),
        source: "local"
      };

      localData.push(newItem);
      saveLocal();
      render(localData);

      form.reset();
    });

    // =========================
    // SIMULATE REMOTE SYNC
    // =========================
    async function fetchRemote() {
      try {
        const res = await fetch(REMOTE_URL + "?t=" + Date.now());
        const remote = await res.json();

        mergeData(remote);
      } catch (err) {
        console.log("No remote file or offline mode");
      }
    }

    // =========================
    // MERGE STRATEGY
    // =========================
    function mergeData(remoteData) {
      const map = new Map();

      // local first
      localData.forEach(item => map.set(item.id, item));

      // remote override/add
      remoteData.forEach(item => {
        if (!map.has(item.id)) {
          map.set(item.id, {
            ...item,
            source: "remote"
          });
        }
      });

      localData = Array.from(map.values());

      saveLocal();
      render(localData);
    }

    // =========================
    // MANUAL SYNC BUTTON
    // =========================
    document.getElementById("forceSync").addEventListener("click", fetchRemote);

    // =========================
    // AUTO SYNC (POLLING)
    // =========================
    setInterval(fetchRemote, 3000);

    // init
    render(localData);
    fetchRemote();
  </script>
</body>
</html>
