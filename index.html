<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Post Dim - CRUD JSON Sync</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      padding-top: 40px;
    }

    .container {
      width: 500px;
    }

    h2 {
      margin-bottom: 10px;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 10px;
    }

    input {
      padding: 10px;
      border-radius: 6px;
      border: none;
      outline: none;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .add {
      background: #22c55e;
      color: white;
    }

    .sync {
      background: #3b82f6;
      color: white;
      margin-bottom: 10px;
    }

    .card {
      background: #1e293b;
      padding: 10px;
      border-radius: 6px;
      margin-top: 10px;
    }

    .actions {
      margin-top: 10px;
      display: flex;
      gap: 5px;
    }

    .edit {
      background: #f59e0b;
      color: black;
      flex: 1;
    }

    .delete {
      background: #ef4444;
      color: white;
      flex: 1;
    }

    .meta {
      font-size: 11px;
      color: #94a3b8;
    }
  </style>
</head>

<body>
  <div class="container">

    <h2>Post Dim - CRUD JSON Sync</h2>

    <button class="sync" id="syncBtn">Sync Remote JSON</button>

    <form id="form">
      <input type="hidden" id="editId" />
      <input type="text" id="name" placeholder="Name" required />
      <input type="text" id="message" placeholder="Message" required />
      <button class="add" type="submit">Save</button>
    </form>

    <div id="list"></div>
  </div>

  <script>
    // =========================
    const STORAGE_KEY = "postdim_crud";
    const REMOTE_URL = "./data.json";

    let data = load();

    const form = document.getElementById("form");
    const list = document.getElementById("list");

    // =========================
    // LOAD / SAVE
    // =========================
    function load() {
      return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    }

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    // =========================
    // RENDER
    // =========================
    function render() {
      list.innerHTML = "";

      data
        .slice()
        .reverse()
        .forEach(item => {
          const div = document.createElement("div");
          div.className = "card";

          div.innerHTML = `
            <div class="meta">
              ${item.id}
            </div>

            <b>${item.name}</b><br/>
            ${item.message}

            <div class="actions">
              <button class="edit">Edit</button>
              <button class="delete">Delete</button>
            </div>
          `;

          // EDIT
          div.querySelector(".edit").onclick = () => {
            document.getElementById("editId").value = item.id;
            document.getElementById("name").value = item.name;
            document.getElementById("message").value = item.message;
          };

          // DELETE
          div.querySelector(".delete").onclick = () => {
            data = data.filter(d => d.id !== item.id);
            save();
            render();
          };

          list.appendChild(div);
        });
    }

    // =========================
    // CREATE / UPDATE
    // =========================
    form.addEventListener("submit", (e) => {
      e.preventDefault();

      const id = document.getElementById("editId").value;
      const name = document.getElementById("name").value;
      const message = document.getElementById("message").value;

      if (id) {
        // UPDATE
        const item = data.find(d => d.id === id);
        if (item) {
          item.name = name;
          item.message = message;
        }
      } else {
        // CREATE
        data.push({
          id: crypto.randomUUID(),
          name,
          message,
          timestamp: Date.now(),
          source: "local"
        });
      }

      save();
      render();
      form.reset();
    });

    // =========================
    // SIMULATED SYNC (JSON FILE)
    // =========================
    async function syncRemote() {
      try {
        const res = await fetch(REMOTE_URL + "?t=" + Date.now());
        const remote = await res.json();

        merge(remote);
      } catch (e) {
        console.log("No remote file");
      }
    }

    function merge(remote) {
      const map = new Map();

      data.forEach(d => map.set(d.id, d));

      remote.forEach(r => {
        if (!map.has(r.id)) {
          map.set(r.id, r);
        }
      });

      data = Array.from(map.values());
      save();
      render();
    }

    document.getElementById("syncBtn").onclick = syncRemote;

    // init
    render();
  </script>
</body>
</html>
