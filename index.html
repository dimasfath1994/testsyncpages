<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post Dim - Auto Refresh 3s</title>

  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      padding-top: 40px;
      margin: 0;
    }

    .container {
      width: 100%;
      max-width: 520px;
      padding: 20px;
    }

    h2 {
      text-align: center;
      color: #38bdf8;
      margin-bottom: 5px;
    }

    .status-bar {
      text-align: center;
      font-size: 12px;
      color: #94a3b8;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #1e293b;
      color: white;
      box-sizing: border-box;
      outline: none;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      background: #22c55e;
      color: white;
      transition: opacity 0.2s;
    }

    button:active {
      opacity: 0.8;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      margin-top: 12px;
      border-radius: 8px;
      border-left: 4px solid #38bdf8;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card b {
      color: #38bdf8;
      display: block;
    }

    #list {
      margin-top: 20px;
    }
  </style>
</head>

<body>
  <div class="container">
    <h2>Post Dim</h2>
    <div class="status-bar" id="status">Auto-sync aktif (3s)</div>

    <input id="name" placeholder="Nama Anda" />
    <input id="message" placeholder="Tulis pesan..." />

    <button onclick="addMessage()">Kirim Pesan</button>

    <div id="list">
      <p style="text-align: center; color: #94a3b8;">Menghubungkan...</p>
    </div>
  </div>

  <script>
    /* =========================
       CONFIG
    ========================= */
    const SUPABASE_URL = "https://dppocgudnizboyjhkqpp.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_sohjVB2_F6I12ivkKHh07g_06hOuThS"; // <--- GANTI DENGAN KEY ASLI

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const listContainer = document.getElementById("list");

    /* =========================
       LOAD DATA
    ========================= */
    async function loadMessages() {
      const { data, error } = await supabase
        .from("messages")
        .select("*")
        .order("created_at", { ascending: false });

      if (error) {
        console.error("Fetch Error:", error.message);
        return;
      }
      
      render(data || []);
    }

    /* =========================
       RENDER DATA
    ========================= */
    function render(messages) {
      if (messages.length === 0) {
        listContainer.innerHTML = '<p style="text-align: center; color: #94a3b8;">Belum ada pesan.</p>';
        return;
      }

      listContainer.innerHTML = "";
      messages.forEach(m => {
        const div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `<b>${m.name}</b> ${m.message}`;
        listContainer.appendChild(div);
      });
    }

    /* =========================
       SEND DATA
    ========================= */
    window.addMessage = async function () {
      const nameInput = document.getElementById("name");
      const messageInput = document.getElementById("message");

      if (!nameInput.value || !messageInput.value) return;

      const { error } = await supabase
        .from("messages")
        .insert([{ name: nameInput.value, message: messageInput.value }]);

      if (error) {
        alert("Gagal kirim: " + error.message);
      } else {
        messageInput.value = "";
        loadMessages(); // Langsung refresh setelah kirim
      }
    };

    /* =========================
       AUTO REFRESH LOGIC (3 DETIK)
    ========================= */
    // Jalankan pertama kali saat load
    loadMessages();

    // Jalankan setiap 3000ms (3 detik)
    setInterval(() => {
      console.log("Auto refreshing data...");
      loadMessages();
    }, 3000);

  </script>
</body>
</html>
