<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post Dim - Rust J6 Edition</title>

  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      padding-top: 40px;
      margin: 0;
    }
    .container {
      width: 100%;
      max-width: 520px;
      padding: 20px;
    }
    h2 { text-align: center; color: #38bdf8; margin-bottom: 5px; }
    .status-bar { text-align: center; font-size: 12px; color: #94a3b8; margin-bottom: 20px; }
    
    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #1e293b;
      color: white;
      box-sizing: border-box;
      outline: none;
    }

    .btn-send {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      background: #22c55e;
      color: white;
      margin-bottom: 20px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      margin-top: 12px;
      border-radius: 8px;
      border-left: 4px solid #38bdf8;
      position: relative;
    }

    .card b { color: #38bdf8; display: block; margin-bottom: 5px; }
    
    .actions {
      margin-top: 10px;
      display: flex;
      gap: 10px;
    }

    .btn-action {
      padding: 5px 10px;
      font-size: 11px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      color: white;
      font-weight: bold;
    }

    .edit { background: #eab308; }
    .delete { background: #ef4444; }

    #list { margin-top: 20px; }
  </style>
</head>
<body>

  <div class="container">
    <h2>Post Dim J6</h2>
    <div class="status-bar">🚀 Connected to Termux | Auto-sync 3s</div>

    <input id="name" placeholder="Nama Anda" />
    <input id="message" placeholder="Tulis pesan..." />

    <button id="btnSend" class="btn-send">Kirim Pesan</button>

    <div id="list">
      <p style="text-align: center; color: #94a3b8;">Memuat data dari J6...</p>
    </div>
  </div>

  <script>
    (function() {
      // URL Cloudflare Tunnel kamu
      const API_URL = "https://events-soundtrack-hobby-furthermore.trycloudflare.com/messages";
      
      const listContainer = document.getElementById("list");
      const nameInput = document.getElementById("name");
      const messageInput = document.getElementById("message");
      const btnSend = document.getElementById("btnSend");

      // --- FUNGSI LOAD (GET) ---
      async function loadMessages() {
        try {
          const response = await fetch(API_URL);
          if (!response.ok) throw new Error("Gagal ambil data");
          const data = await response.json();
          render(data);
        } catch (err) {
          console.error("Fetch Error:", err);
        }
      }

      // --- FUNGSI RENDER ---
      function render(messages) {
        if (!messages || messages.length === 0) {
          listContainer.innerHTML = '<p style="text-align: center; color: #94a3b8;">Belum ada pesan.</p>';
          return;
        }
        listContainer.innerHTML = "";
        messages.forEach(m => {
          const div = document.createElement("div");
          div.className = "card";
          div.innerHTML = `
            <b>${m.name}</b>
            <span>${m.message}</span>
            <div class="actions">
              <button class="btn-action edit" onclick="editMsg(${m.id}, '${m.name}', '${m.message}')">Edit</button>
              <button class="btn-action delete" onclick="deleteMsg(${m.id})">Hapus</button>
            </div>
          `;
          listContainer.appendChild(div);
        });
      }

      // --- FUNGSI KIRIM (POST) ---
      btnSend.addEventListener("click", async () => {
        const name = nameInput.value.trim();
        const message = messageInput.value.trim();
        if (!name || !message) return;

        try {
          const response = await fetch(API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name, message })
          });

          if (response.ok) {
            messageInput.value = "";
            loadMessages();
          }
        } catch (err) {
          alert("Gagal kirim pesan ke J6");
        }
      });

      // --- FUNGSI EDIT (POST ke /messages/:id) ---
      window.editMsg = async (id, name, oldMsg) => {
        const newMsg = prompt("Edit pesan Anda:", oldMsg);
        if (newMsg === null || newMsg.trim() === "" || newMsg === oldMsg) return;

        try {
          const response = await fetch(`${API_URL}/${id}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name, message: newMsg }) // Sesuai struct CreateMessage di Rust
          });

          if (response.ok) loadMessages();
          else alert("Gagal update data");
        } catch (err) {
          alert("Error koneksi ke API");
        }
      };

      // --- FUNGSI DELETE (DELETE ke /messages/:id) ---
      window.deleteMsg = async (id) => {
        if (!confirm("Yakin ingin menghapus pesan ini?")) return;

        try {
          const response = await fetch(`${API_URL}/${id}`, {
            method: "DELETE"
          });

          if (response.ok) loadMessages();
          else alert("Gagal hapus data");
        } catch (err) {
          alert("Error koneksi ke API");
        }
      };

      // Jalankan interval
      loadMessages();
      setInterval(loadMessages, 3000);

    })();
  </script>

</body>
</html>
