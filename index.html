<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Post Dim - Fixed GitHub Sync</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      padding-top: 40px;
    }

    .container {
      width: 520px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 8px;
      border-radius: 6px;
      border: none;
    }

    button {
      padding: 10px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      margin-right: 5px;
    }

    .add { background: #22c55e; color: white; }
    .sync { background: #3b82f6; color: white; }

    .card {
      background: #1e293b;
      padding: 10px;
      margin-top: 10px;
      border-radius: 6px;
    }

    .actions {
      margin-top: 8px;
    }

    .edit { background: #f59e0b; }
    .delete { background: #ef4444; color: white; }
  </style>
</head>

<body>
  <div class="container">

    <h2>Post Dim - GitHub Sync FIX</h2>

    <input type="hidden" id="editId">

    <input id="name" placeholder="Name" />
    <input id="message" placeholder="Message" />

    <button class="add" onclick="saveData()">Save</button>
    <button class="sync" onclick="syncFromGitHub()">Sync Now</button>

    <div id="list"></div>
  </div>

  <script>
    // =========================
    const GITHUB_USER = "dimasfath1994";
    const GITHUB_REPO = "testsyncpages";
    const FILE_PATH = "data.json";
    const TOKEN = "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";

    let data = [];

    const list = document.getElementById("list");

    // =========================
    function render() {
      list.innerHTML = "";

      data.forEach(item => {
        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
          <b>${item.name}</b><br/>
          ${item.message}

          <div class="actions">
            <button class="edit">Edit</button>
            <button class="delete">Delete</button>
          </div>
        `;

        div.querySelector(".edit").onclick = () => {
          document.getElementById("editId").value = item.id;
          document.getElementById("name").value = item.name;
          document.getElementById("message").value = item.message;
        };

        div.querySelector(".delete").onclick = () => {
          data = data.filter(d => d.id !== item.id);
          pushToGitHub();
          render();
        };

        list.appendChild(div);
      });
    }

    // =========================
    function saveData() {
      const id = document.getElementById("editId").value;
      const name = document.getElementById("name").value;
      const message = document.getElementById("message").value;

      if (id) {
        const item = data.find(d => d.id === id);
        item.name = name;
        item.message = message;
      } else {
        data.push({
          id: crypto.randomUUID(),
          name,
          message,
          timestamp: Date.now()
        });
      }

      pushToGitHub();
      render();
    }

    // =========================
    // 🔥 PUSH (FIXED + DEBUG)
    // =========================
    async function pushToGitHub() {
      try {
        const url = `https://api.github.com/repos/${USER}/${REPO}/contents/${FILE}`;

        console.log("📡 GET FILE FOR SHA...");

        const getRes = await fetch(url, {
          headers: {
            Authorization: `token ${TOKEN}`
          }
        });

        const file = await getRes.json();

        if (!file.sha) {
          console.error("❌ SHA NOT FOUND", file);
          return;
        }

        console.log("✅ SHA FOUND:", file.sha);

        const content = btoa(
          unescape(encodeURIComponent(JSON.stringify(data, null, 2)))
        );

        console.log("📤 PUSHING DATA...");

        const res = await fetch(url, {
          method: "PUT",
          headers: {
            Authorization: `token ${TOKEN}`,
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            message: "update data.json",
            content,
            sha: file.sha
          })
        });

        const result = await res.json();

        console.log("📦 PUSH RESULT:", result);

        if (res.ok) {
          console.log("✅ SYNC SUCCESS");
        } else {
          console.error("❌ SYNC FAILED", result);
        }

      } catch (err) {
        console.error("❌ PUSH ERROR:", err);
      }
    }

    // =========================
    // 🔥 PULL (SYNC READ)
    // =========================
    async function syncFromGitHub() {
      try {
        const url = `https://raw.githubusercontent.com/${USER}/${REPO}/main/${FILE}`;

        console.log("📥 FETCHING:", url);

        const res = await fetch(url + "?t=" + Date.now());

        const text = await res.text();

        console.log("RAW RESPONSE:", text);

        data = JSON.parse(text);

        render();

        console.log("✅ SYNC PULL OK");

      } catch (err) {
        console.error("❌ SYNC PULL FAILED:", err);
      }
    }

    // auto sync
    setInterval(syncFromGitHub, 5000);

    syncFromGitHub();
  </script>
</body>
</html>
