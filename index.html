<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Post Dim - GitHub Sync (No DB)</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      padding-top: 40px;
    }

    .container {
      width: 520px;
    }

    h2 {
      margin-bottom: 10px;
    }

    input {
      padding: 10px;
      width: 100%;
      margin-bottom: 8px;
      border-radius: 6px;
      border: none;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 5px;
    }

    .add { background: #22c55e; color: white; }
    .sync { background: #3b82f6; color: white; }
    .danger { background: #ef4444; color: white; }

    .card {
      background: #1e293b;
      padding: 10px;
      margin-top: 10px;
      border-radius: 6px;
    }

    .actions {
      display: flex;
      gap: 5px;
      margin-top: 8px;
    }

    .edit { background: #f59e0b; flex: 1; }
    .delete { background: #ef4444; flex: 1; }
  </style>
</head>

<body>
  <div class="container">

    <h2>Post Dim - GitHub Sync</h2>

    <input type="hidden" id="editId">

    <input id="name" placeholder="Name" />
    <input id="message" placeholder="Message" />

    <button class="add" onclick="saveData()">Save</button>
    <button class="sync" onclick="syncFromGitHub()">Sync Now</button>

    <div id="list"></div>
  </div>

  <script>
    // =========================
    // 🔥 GITHUB CONFIG
    // =========================
    const GITHUB_USER = "YOUR_USERNAME";
    const GITHUB_REPO = "YOUR_REPO";
    const FILE_PATH = "data.json";
    const TOKEN = "YOUR_GITHUB_TOKEN";

    let data = [];

    // =========================
    // LOAD LOCAL FIRST
    // =========================
    function render() {
      const list = document.getElementById("list");
      list.innerHTML = "";

      data.forEach(item => {
        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
          <b>${item.name}</b><br/>
          ${item.message}

          <div class="actions">
            <button class="edit">Edit</button>
            <button class="delete">Delete</button>
          </div>
        `;

        // EDIT
        div.querySelector(".edit").onclick = () => {
          document.getElementById("editId").value = item.id;
          document.getElementById("name").value = item.name;
          document.getElementById("message").value = item.message;
        };

        // DELETE
        div.querySelector(".delete").onclick = () => {
          data = data.filter(d => d.id !== item.id);
          pushToGitHub();
          render();
        };

        list.appendChild(div);
      });
    }

    // =========================
    // CREATE / UPDATE
    // =========================
    function saveData() {
      const id = document.getElementById("editId").value;
      const name = document.getElementById("name").value;
      const message = document.getElementById("message").value;

      if (id) {
        const item = data.find(d => d.id === id);
        item.name = name;
        item.message = message;
      } else {
        data.push({
          id: crypto.randomUUID(),
          name,
          message,
          timestamp: Date.now()
        });
      }

      pushToGitHub();
      render();
    }

    // =========================
    // PUSH TO GITHUB (WRITE SYNC)
    // =========================
    async function pushToGitHub() {
      const url = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${FILE_PATH}`;

      // get current file SHA
      const getRes = await fetch(url, {
        headers: { Authorization: `token ${TOKEN}` }
      });

      const file = await getRes.json();

      const content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));

      await fetch(url, {
        method: "PUT",
        headers: {
          Authorization: `token ${TOKEN}`,
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          message: "update data.json",
          content,
          sha: file.sha
        })
      });
    }

    // =========================
    // PULL FROM GITHUB
    // =========================
    async function syncFromGitHub() {
      const url = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main/${FILE_PATH}`;

      const res = await fetch(url + "?t=" + Date.now());
      data = await res.json();

      render();
    }

    // =========================
    // AUTO SYNC (every 5 sec)
    // =========================
    setInterval(syncFromGitHub, 5000);

    // init
    syncFromGitHub();
  </script>
</body>
</html>
