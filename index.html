<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Post Dim - Supabase Fixed</title>

  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      padding-top: 40px;
    }

    .container {
      width: 520px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 8px;
      border-radius: 6px;
      border: none;
      outline: none;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .add {
      background: #22c55e;
      color: white;
    }

    .card {
      background: #1e293b;
      padding: 10px;
      margin-top: 10px;
      border-radius: 6px;
    }
  </style>
</head>

<body>
  <div class="container">

    <h2>Post Dim - Supabase Realtime</h2>

    <input id="name" placeholder="Name" />
    <input id="message" placeholder="Message" />

    <button class="add" onclick="addMessage()">Send</button>

    <div id="list"></div>

  </div>

<script>
/* =========================
   CONFIG
========================= */
const SUPABASE_URL = "https://dppocgudnizboyjhkqpp.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_sohjVB2_F6I12ivkKHh07g_06hOuThS"; // pakai sb_publishable_xxx

/* =========================
   INIT SUPABASE (SAFE)
========================= */
window.supabaseClient =
  window.supabaseClient ||
  window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const supabase = window.supabaseClient;

/* =========================
   STATE
========================= */
const list = document.getElementById("list");

/* =========================
   RENDER
========================= */
function render(messages) {
  list.innerHTML = "";

  messages.forEach(m => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <b>${m.name}</b><br/>
      ${m.message}
    `;

    list.appendChild(div);
  });
}

/* =========================
   LOAD DATA
========================= */
async function loadMessages() {
  const { data, error } = await supabase
    .from("messages")
    .select("*")
    .order("created_at", { ascending: false });

  if (error) {
    console.error("LOAD ERROR:", error);
    return;
  }

  render(data || []);
}

/* =========================
   CREATE MESSAGE
   (IMPORTANT: GLOBAL SCOPE)
========================= */
window.addMessage = async function () {
  const name = document.getElementById("name").value;
  const message = document.getElementById("message").value;

  if (!name || !message) return;

  const { error } = await supabase
    .from("messages")
    .insert([{ name, message }]);

  if (error) {
    console.error("INSERT ERROR:", error);
  }

  document.getElementById("message").value = "";
};

/* =========================
   REALTIME SYNC
========================= */
supabase
  .channel("messages")
  .on(
    "postgres_changes",
    { event: "*", schema: "public", table: "messages" },
    () => {
      loadMessages();
    }
  )
  .subscribe();

/* =========================
   INIT
========================= */
loadMessages();
</script>

</body>
</html>
