<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Post Dim - Supabase Version</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      padding-top: 40px;
    }

    .container {
      width: 520px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 8px;
      border-radius: 6px;
      border: none;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin-right: 5px;
    }

    .add { background: #22c55e; color: white; }
    .card {
      background: #1e293b;
      padding: 10px;
      margin-top: 10px;
      border-radius: 6px;
    }
  </style>
</head>

<body>
  <div class="container">

    <h2>Post Dim - Supabase Sync</h2>

    <input id="name" placeholder="Name" />
    <input id="message" placeholder="Message" />

    <button class="add" onclick="addMessage()">Send</button>

    <div id="list"></div>

  </div>

<script>
/* =========================
   CONFIG SUPABASE
========================= */
const SUPABASE_URL = "YOUR_SUPABASE_URL";
const SUPABASE_ANON_KEY = "YOUR_SUPABASE_ANON_KEY";

const supabase = window.supabase.createClient(
  SUPABASE_URL,
  SUPABASE_ANON_KEY
);

const list = document.getElementById("list");

/* =========================
   RENDER UI
========================= */
function render(messages) {
  list.innerHTML = "";

  messages.forEach(m => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <b>${m.name}</b><br/>
      ${m.message}
    `;

    list.appendChild(div);
  });
}

/* =========================
   LOAD DATA
========================= */
async function loadMessages() {
  const { data } = await supabase
    .from("messages")
    .select("*")
    .order("created_at", { ascending: false });

  render(data || []);
}

/* =========================
   CREATE (INSERT)
========================= */
async function addMessage() {
  const name = document.getElementById("name").value;
  const message = document.getElementById("message").value;

  if (!name || !message) return;

  await supabase
    .from("messages")
    .insert([{ name, message }]);

  document.getElementById("message").value = "";
}

/* =========================
   REALTIME SYNC
========================= */
supabase
  .channel("messages")
  .on(
    "postgres_changes",
    { event: "*", schema: "public", table: "messages" },
    () => {
      loadMessages(); // refresh semua device
    }
  )
  .subscribe();

/* =========================
   INIT
========================= */
loadMessages();
</script>

</body>
</html>
